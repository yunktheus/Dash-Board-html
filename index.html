<!-- JavaScript modules -->
<script>
// ======================== CONSTANTES ========================
const STORAGE_KEY   = 'estudosF1_data';
const TITLE_KEY     = 'estudosF1_customTitle';
const THEME_KEY     = 'theme';

const daysOrder = ['segunda','terca','quarta','quinta','sexta'];
const dayNames  = {
    segunda: 'Segunda-feira', terca: 'Terça-feira', quarta: 'Quarta-feira',
    quinta: 'Quinta-feira', sexta: 'Sexta-feira'
};

const defaultTasks = {

        { text: "📝 Resumo e próximo passo (10min)",  done: false }
    ],
    terca: [
        { text: "📈 Planejar estudo de marketing (5min)",       done: false },
        { text: "🎓 Conteúdo teórico: funis/tráfego (25min)",  done: false },
        { text: "✏️ Exercício aplicado (20min)",                done: false },
        { text: "📓 Anotar aprendizados (10min)",               done: false }
    ],
    quarta: [
        { text: "🔄 Revisão rápida (5min)",            done: false },
        { text: "📺 Condicionais (if/else) (20min)",   done: false },
        { text: "💻 Desafio prático (25min)",           done: false },
        { text: "📌 Documentar descobertas (10min)",    done: false }
    ],
    quinta: [
        { text: "📊 Copywriting para conversão (25min)", done: false },
        { text: "📉 Métricas e KPIs (20min)",             done: false },
        { text: "📱 Criação de conteúdo (15min)",         done: false },
        { text: "✅ Checklist da semana (10min)",         done: false }
    ],
    sexta: [
        { text: "🔁 Revisão geral da semana (10min)",  done: false },
        { text: "🚀 Iniciar pequeno projeto (30min)",   done: false },
        { text: "🐞 Debug / Documentação (15min)",      done: false },
        { text: "🏁 Planejar próximos passos (5min)",   done: false }
    ]
};

// ======================== ESTADO GLOBAL ========================
let tasksData    = JSON.parse(JSON.stringify(defaultTasks));
// notes[day] = array of { text, time } objects
let notes = { segunda: [], terca: [], quarta: [], quinta: [], sexta: [] };
let resourcesData = {
    programacao: {
        title: "Ideias Programação",
        items: [
            "✅ Calculadora interativa",
            "✅ To-do list com localStorage",
            "✅ Gerador de senhas",
            "✅ Jogo da velha",
            "✅ Dashboard de estudos"
        ]
    },
    marketing: {
        title: "Exercícios Marketing",
        items: [
            "📈 Criar funil de vendas",
            "📊 Campanha para Instagram",
            "✍️ Escrever 3 headlines de copy",
            "🔍 Pesquisar palavras-chave SEO",
            "📧 Sequência de e-mail marketing"
        ]
    }
};

/**
 * timersState[day] = {
 *   intervalId : number | null,
 *   timeLeft   : number,   // seconds remaining
 *   isRunning  : boolean,
 * }
 * DOM references (timerBtn, minutesInput) are resolved fresh each render,
 * so we do NOT store them here — avoids stale-reference bugs after renderWeek().
 */
const timersState = {};

// ======================== UTILITÁRIOS ========================

/** Escapa &, <, > e aspas duplas para uso seguro em HTML e atributos. */
function escapeHtml(str) {
    if (str == null) return '';
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
}

// ======================== MODAL ENGINE ========================
const _modal = {
    overlay : null,
    input   : null,
    _confirm: null,
    _cancel : null,
    charCount: null,
    bodyText: null,
    inputWrap: null,
    _resolve: null,

    init() {
        this.overlay  = document.getElementById('modalOverlay');
        this.input    = document.getElementById('modalInput');
        this._confirm = document.getElementById('modalConfirm');
        this._cancel  = document.getElementById('modalCancel');
        this.charCount= document.getElementById('modalCharCount');
        this.bodyText = document.getElementById('modalBodyText');
        this.inputWrap= document.getElementById('modalInputWrap');

        this._confirm.addEventListener('click', () => this._submit());
        this._cancel.addEventListener('click',  () => this._close(null));

        this.overlay.addEventListener('click', e => {
            if (e.target === this.overlay) this._close(null);
        });

        document.addEventListener('keydown', e => {
            if (!this.overlay.classList.contains('open')) return;
            if (e.key === 'Escape') this._close(null);
            // Don't intercept Enter inside textareas (note modal)
            if (e.key === 'Enter' && !e.shiftKey && e.target.tagName !== 'TEXTAREA') {
                e.preventDefault();
                this._submit();
            }
        });

        this.input.addEventListener('input', () => {
            const len = this.input.value.length;
            const max = parseInt(this.input.getAttribute('maxlength'), 10);
            this.charCount.textContent = `${len} / ${max}`;
        });
    },

    prompt({ title, subtitle = '', placeholder = 'Digite aqui…', value = '',
              icon = 'fas fa-pen', confirmLabel = 'Salvar', maxLength = 120 } = {}) {
        return new Promise(resolve => {
            this._resolve = resolve;
            this._setup({ title, subtitle, icon, confirmLabel, mode: 'input',
                          placeholder, value, maxLength });
            this._open();
        });
    },

    confirm_dialog({ title, subtitle = '', body = '', icon = 'fas fa-trash',
                     confirmLabel = 'Confirmar', danger = false, iconVariant = '' } = {}) {
        return new Promise(resolve => {
            this._resolve = resolve;
            this._setup({ title, subtitle, icon, confirmLabel, mode: 'confirm',
                          body, danger, iconVariant });
            this._open();
        });
    },

    _setup({ title, subtitle, icon, confirmLabel, mode, placeholder, value, maxLength, body, danger, iconVariant = '' }) {
        document.getElementById('modalTitle').textContent    = title;
        document.getElementById('modalSubtitle').textContent = subtitle;
        const iconEl = document.getElementById('modalIcon');
        iconEl.innerHTML = `<i class="${icon}" aria-hidden="true"></i>`;
        iconEl.className = `modal-icon${iconVariant ? ' ' + iconVariant : ''}`;

        this._confirm.textContent  = confirmLabel;
        this._confirm.className    = `modal-btn ${danger ? 'modal-btn-danger' : 'modal-btn-confirm'}`;

        if (mode === 'input') {
            this.inputWrap.style.display = '';
            this.bodyText.style.display  = 'none';
            this.input.setAttribute('maxlength', maxLength);
            this.input.setAttribute('placeholder', placeholder);
            this.input.value = value || '';
            this.charCount.textContent = `${(value || '').length} / ${maxLength}`;
        } else {
            this.inputWrap.style.display = 'none';
            this.bodyText.style.display  = '';
            this.bodyText.textContent    = body;
        }
    },

    _open() {
        this.overlay.classList.add('open');
        if (this.inputWrap.style.display !== 'none') {
            setTimeout(() => { this.input.focus(); this.input.select(); }, 60);
        } else {
            setTimeout(() => this._confirm.focus(), 60);
        }
    },

    _submit() {
        if (this._colorPickerMode) {
            this._colorPickerMode = false;
            const val = this._colorGetVal ? this._colorGetVal() : PASTA_CORES[0];
            this._colorGetVal = null;
            this._resetInputWrap();
            this._close(val);
            return;
        }
        if (this._bibMode) {
            this._bibMode = false;
            const titulo  = (document.getElementById('_bibTitulo')?.value || '').trim();
            const url     = (document.getElementById('_bibUrl')?.value    || '').trim();
            const tipo    = document.getElementById('_bibTipo')?.value    || 'link';
            const pastaId = document.getElementById('_bibPasta')?.value   || '';
            const day     = document.getElementById('_bibDay')?.value     || 'geral';
            this._resetInputWrap();
            if (!titulo) { this._close(null); return; }
            const newItem = {
                id: genId(),
                titulo, url, tipo, pastaId, day,
                addedAt: new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' }),
            };
            this._close(newItem);
            return;
        }
        if (this._timerMode) {
            this._timerMode = false;
            const val = this._timerGetVal ? this._timerGetVal() : 25;
            this._timerGetVal = null;
            this._resetInputWrap();
            this._close(val);
            return;
        }
        if (this._noteMode) {
            this._noteMode = false;
            const ta = document.getElementById('_noteTextarea');
            const val = ta ? ta.value.trim() : null;
            this._resetInputWrap();
            this._close(val === '' ? null : val);
            return;
        }
        if (this.inputWrap.style.display !== 'none') {
            const val = this.input.value.trim();
            this._close(val === '' ? null : val);
        } else {
            this._close(true);
        }
    },

    _close(result) {
        this.overlay.classList.remove('open');
        // Reset special modes on cancel
        if (result === null) {
            if (this._colorPickerMode) {
                this._colorPickerMode = false;
                this._colorGetVal = null;
                this._resetInputWrap();
            }
            if (this._bibMode) {
                this._bibMode = false;
                this._resetInputWrap();
            }
            if (this._timerMode) {
                this._timerMode = false;
                this._timerGetVal = null;
                this._resetInputWrap();
            }
            if (this._noteMode) {
                this._noteMode = false;
                this._resetInputWrap();
            }
        }
        if (this._resolve) {
            this._resolve(result);
            this._resolve = null;
        }
    },

    _resetInputWrap() {
        this.inputWrap.innerHTML = `
            <input type="text" class="modal-input" id="modalInput"
                   maxlength="120" autocomplete="off" spellcheck="true"
                   placeholder="Digite aqui…" aria-label="Campo de texto">
            <div class="modal-char-count" id="modalCharCount">0 / 120</div>
        `;
        this.input    = document.getElementById('modalInput');
        this.charCount= document.getElementById('modalCharCount');
        this.input.addEventListener('input', () => {
            const len = this.input.value.length;
            const max = parseInt(this.input.getAttribute('maxlength'), 10);
            this.charCount.textContent = `${len} / ${max}`;
        });
    },

    /**
     * Timer picker modal — returns Promise<number|null> (minutes)
     */
    timerPicker({ subtitle = '' } = {}) {
        return new Promise(resolve => {
            this._resolve = resolve;

            document.getElementById('modalTitle').textContent    = 'Configurar timer';
            document.getElementById('modalSubtitle').textContent = subtitle;
            document.getElementById('modalIcon').innerHTML =
                '<i class="fas fa-hourglass-start" aria-hidden="true"></i>';
            this._confirm.textContent = 'Iniciar';
            this._confirm.className   = 'modal-btn modal-btn-confirm';

            // Build timer picker UI inside inputWrap
            this.inputWrap.style.display = '';
            this.bodyText.style.display  = 'none';

            const presets = [
                { label: '5 min',  sub: 'Aquecimento', val: 5 },
                { label: '10 min', sub: 'Rápido',      val: 10 },
                { label: '15 min', sub: 'Foco',        val: 15 },
                { label: '25 min', sub: 'Pomodoro',    val: 25 },
                { label: '45 min', sub: 'Profundo',    val: 45 },
                { label: '60 min', sub: '1 hora',      val: 60 },
            ];

            let selected = 25;

            this.inputWrap.innerHTML = `
                <div class="timer-presets" id="_timerPresets"></div>
                <div class="timer-custom-wrap">
                    <span class="timer-custom-label">Outro:</span>
                    <input type="number" class="timer-custom-input" id="_timerCustom"
                           min="1" max="180" value="${selected}" aria-label="Minutos personalizado">
                    <span class="timer-custom-label">min</span>
                </div>
                <div class="timer-display" id="_timerDisplay">Timer de <strong>${selected} minutos</strong></div>
            `;

            const presetsEl = document.getElementById('_timerPresets');
            const customEl  = document.getElementById('_timerCustom');
            const displayEl = document.getElementById('_timerDisplay');

            const setSelected = (val, fromCustom = false) => {
                selected = val;
                displayEl.innerHTML = `Timer de <strong>${val} minuto${val !== 1 ? 's' : ''}</strong>`;
                if (!fromCustom) customEl.value = val;
                presetsEl.querySelectorAll('.timer-preset-btn').forEach(b => {
                    b.classList.toggle('selected', parseInt(b.dataset.val, 10) === val);
                });
            };

            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.className = `timer-preset-btn${p.val === selected ? ' selected' : ''}`;
                btn.dataset.val = p.val;
                btn.innerHTML = `${p.label}<span class="timer-preset-label">${p.sub}</span>`;
                btn.addEventListener('click', () => setSelected(p.val));
                presetsEl.appendChild(btn);
            });

            customEl.addEventListener('input', () => {
                const v = parseInt(customEl.value, 10);
                if (Number.isFinite(v) && v >= 1) setSelected(v, true);
            });

            // Override _submit for this mode
            this._timerMode = true;
            this._timerGetVal = () => {
                const v = parseInt(customEl.value, 10);
                return (Number.isFinite(v) && v >= 1) ? v : selected;
            };

            this._open();
        });
    },

    /**
     * Note input modal — textarea, returns Promise<string|null>
     */
    note({ title = 'Nova anotação', subtitle = '' } = {}) {
        return new Promise(resolve => {
            this._resolve = resolve;

            document.getElementById('modalTitle').textContent    = title;
            document.getElementById('modalSubtitle').textContent = subtitle;
            document.getElementById('modalIcon').innerHTML =
                '<i class="fas fa-sticky-note" aria-hidden="true"></i>';
            this._confirm.textContent = 'Salvar';
            this._confirm.className   = 'modal-btn modal-btn-confirm';

            this.inputWrap.style.display = '';
            this.bodyText.style.display  = 'none';

            this.inputWrap.innerHTML = `
                <textarea class="modal-textarea" id="_noteTextarea" rows="4"
                          maxlength="400" placeholder="Escreva sua anotação aqui…"
                          aria-label="Texto da anotação"></textarea>
            `;

            this._noteMode = true;
            this._open();
            setTimeout(() => document.getElementById('_noteTextarea')?.focus(), 60);
        });
    },
};

// ======================== TÍTULO EDITÁVEL ========================
function updatePageTitle(newTitle) {
    document.title = newTitle;
    localStorage.setItem(TITLE_KEY, newTitle);
}

function loadSavedTitle() {
    const saved = localStorage.getItem(TITLE_KEY) || 'PomoDash';
    document.getElementById('editableTitle').value = saved;
    updatePageTitle(saved);
}

function setupEditableTitle() {
    const input = document.getElementById('editableTitle');
    input.addEventListener('blur', () => {
        const newTitle = input.value.trim() || 'PomoDash';
        input.value = newTitle;
        updatePageTitle(newTitle);
    });
    input.addEventListener('keydown', e => {
        if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    });
}

// ======================== SOM F1 ========================
function playF1RadioSound() {
    try {
        const ctx  = new (window.AudioContext || window.webkitAudioContext)();
        const gain = ctx.createGain();
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.connect(ctx.destination);

        [[880, 0, 0.12, 'sine'], [1046.5, 0.14, 0.26, 'triangle']].forEach(([freq, start, stop, type]) => {
            const osc = ctx.createOscillator();
            osc.type = type;
            osc.frequency.value = freq;
            osc.connect(gain);
            osc.start(ctx.currentTime + start);
            osc.stop(ctx.currentTime + stop);
        });
    } catch (e) { /* áudio não suportado */ }
}

// ======================== TIMER ========================

/** Atualiza a aparência do botão com base no estado atual do timer. */
function syncTimerButton(day) {
    const btn = document.querySelector(`.timer-btn[data-day="${day}"]`);
    if (!btn) return; // card não está no DOM

    const state = timersState[day];

    if (!state) {
        btn.innerHTML = '<i class="fas fa-hourglass-start" aria-hidden="true"></i> Iniciar timer';
        btn.className = 'timer-btn';
        return;
    }

    const mins = String(Math.floor(state.timeLeft / 60)).padStart(2, '0');
    const secs = String(state.timeLeft % 60).padStart(2, '0');

    if (state.isRunning) {
        btn.innerHTML = `<i class="fas fa-pause" aria-hidden="true"></i> Pausar ${mins}:${secs}`;
        btn.className = 'timer-btn pause-btn';
    } else {
        btn.innerHTML = `<i class="fas fa-play" aria-hidden="true"></i> Retomar ${mins}:${secs}`;
        btn.className = 'timer-btn resume-btn';
    }
}

function stopTimer(day) {
    const state = timersState[day];
    if (!state) return;
    if (state.intervalId) {
        clearInterval(state.intervalId);
        state.intervalId = null;
    }
    state.isRunning = false;
}

function startTimer(day, seconds) {
    stopTimer(day); // garante que não há timer duplicado

    timersState[day] = {
        intervalId: null,
        timeLeft: seconds,
        isRunning: true,
    };

    timersState[day].intervalId = setInterval(() => {
        const state = timersState[day];
        if (!state || !state.isRunning) return;

        state.timeLeft--;

        if (state.timeLeft <= 0) {
            stopTimer(day);
            delete timersState[day];
            syncTimerButton(day);
            playF1RadioSound();
            _modal.confirm_dialog({
                title: 'Tempo finalizado! 🏁',
                subtitle: dayNames[day],
                body: 'Ótimo trabalho! Seu timer chegou ao fim.',
                icon: 'fas fa-flag-checkered',
                confirmLabel: 'Fechar',
                danger: false,
                iconVariant: 'success',
            });
            return;
        }

        syncTimerButton(day); // atualiza label sem re-renderizar
    }, 1000);

    syncTimerButton(day);
}

async function handleTimerClick(day) {
    const state = timersState[day];

    if (!state) {
        // Nenhum timer ativo → abre modal para escolher tempo
        const minutes = await _modal.timerPicker({ subtitle: dayNames[day] });
        if (minutes !== null) startTimer(day, minutes * 60);
        return;
    }

    if (state.isRunning) {
        // Em execução → pausa
        stopTimer(day);
        syncTimerButton(day);
    } else {
        // Pausado → retoma exatamente de onde parou
        state.isRunning = true;
        state.intervalId = setInterval(() => {
            const s = timersState[day];
            if (!s || !s.isRunning) return;
            s.timeLeft--;
            if (s.timeLeft <= 0) {
                stopTimer(day);
                delete timersState[day];
                syncTimerButton(day);
                playF1RadioSound();
                _modal.confirm_dialog({
                    title: 'Tempo finalizado! 🏁',
                    subtitle: dayNames[day],
                    body: 'Ótimo trabalho! Seu timer chegou ao fim.',
                    icon: 'fas fa-flag-checkered',
                    confirmLabel: 'Fechar',
                    danger: false,
                });
                return;
            }
            syncTimerButton(day);
        }, 1000);
        syncTimerButton(day);
    }
}

function renderNotesList(day) {
    const container = document.getElementById(`notes-list-${day}`);
    if (!container) return;
    const dayNotes = notes[day] || [];
    container.innerHTML = '';
    if (dayNotes.length === 0) {
        container.innerHTML = '<div class="notes-empty">Nenhuma anotação ainda</div>';
        return;
    }
    dayNotes.forEach((note, idx) => {
        const div = document.createElement('div');
        div.className = 'note-item';
        div.innerHTML = `
            <div class="note-bullet"></div>
            <span class="note-text">${escapeHtml(note.text)}</span>
            <span class="note-meta">${escapeHtml(note.time || '')}</span>
            <button class="note-delete-btn" data-day="${day}" data-idx="${idx}" title="Remover">
                <i class="fas fa-times" aria-hidden="true"></i>
            </button>
        `;
        div.querySelector('.note-delete-btn').addEventListener('click', async () => {
            const ok = await _modal.confirm_dialog({
                title: 'Remover anotação?',
                subtitle: dayNames[day],
                body: `"${note.text}"`,
                icon: 'fas fa-sticky-note',
                confirmLabel: 'Remover',
                danger: true,
            });
            if (ok) {
                notes[day].splice(idx, 1);
                saveAll();
                renderNotesList(day);
            }

async function openNoteModal(day) {
    const text = await _modal.note({
        title: 'Nova anotação',
        subtitle: dayNames[day],
    });
    if (text !== null) {
        const now = new Date();
        const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        if (!Array.isArray(notes[day])) notes[day] = [];
        notes[day].push({ text, time });
        saveAll();
        renderNotesList(day);
    }
}

            `;

        // Checkbox
        taskContainer.querySelectorAll('.task-check').forEach(cb => {
            cb.addEventListener('change', () => {
                const d   = cb.dataset.day;
                const idx = parseInt(cb.dataset.taskidx, 10);
                if (tasksData[d]?.[idx] !== undefined) {
                    tasksData[d][idx].done = cb.checked;
                    // Atualiza apenas o texto sem re-renderizar tudo
                    const span = cb.nextElementSibling;
                    span.classList.toggle('done', cb.checked);
                    // Atualiza contador no título do card
                    const doneNow = tasksData[d].filter(t => t.done).length;
                    card.querySelector('small').innerHTML =
                        `<i class="fas fa-tasks" aria-hidden="true"></i> ${doneNow}/${tasksData[d].length}`;
                    saveAll();
                    updateProgress();
                }
            });
        });

        // Editar tarefa
        taskContainer.querySelectorAll('.edit-task').forEach(btn => {
            btn.addEventListener('click', async () => {
                const d   = btn.dataset.day;
                const idx = parseInt(btn.dataset.taskidx, 10);
                const newText = await _modal.prompt({
                    title: 'Editar tarefa',
                    subtitle: dayNames[d],
                    value: tasksData[d][idx].text,
                    icon: 'fas fa-pen',
                    confirmLabel: 'Salvar',
                });
                if (newText !== null) {
                    tasksData[d][idx].text = newText;
                    saveAll();
                    renderWeek();
                }
            });
        });

        // Excluir tarefa
        taskContainer.querySelectorAll('.delete-task').forEach(btn => {
            btn.addEventListener('click', async () => {
                const d   = btn.dataset.day;
                const idx = parseInt(btn.dataset.taskidx, 10);
                const ok = await _modal.confirm_dialog({
                    title: 'Remover tarefa?',
                    subtitle: dayNames[d],
                    body: `"${tasksData[d][idx].text}"`,
                    icon: 'fas fa-trash',
                    confirmLabel: 'Remover',
                    danger: true,
                });
                if (ok) {
                    tasksData[d].splice(idx, 1);
                    saveAll();
                    renderWeek();
                }
            });
        });

        // Nova tarefa
        card.querySelector('.add-task-btn').addEventListener('click', async e => {
            const d = e.currentTarget.dataset.day;
            const newText = await _modal.prompt({
                title: 'Nova tarefa',
                subtitle: dayNames[d],
                placeholder: 'Ex: 📚 Estudar capítulo 3 (30min)',
                icon: 'fas fa-plus',
                confirmLabel: 'Adicionar',
            });
            if (newText !== null) {
                tasksData[d].push({ text: newText, done: false });
                saveAll();
                renderWeek();
            }
        });

        // Timer — abre modal de configuração ao clicar em "Iniciar"
        syncTimerButton(day);
        card.querySelector('.timer-btn').addEventListener('click', () => handleTimerClick(day));

        // Notas — renderiza lista de notas do dia
        renderNotesList(day);

        // Botão adicionar anotação
        card.querySelector('.notes-add-btn').addEventListener('click', async () => {
            await openNoteModal(day);
        });

        // Botão biblioteca do dia
        card.querySelector('.card-biblioteca-btn').addEventListener('click', () => {
            openBibliotecaPanel(day);
        });
    }

    updateProgress();
}

// ======================== PROGRESSO ========================
function updateProgress() {
    let total = 0, done = 0;
    for (const day of daysOrder) {
        const tasks = tasksData[day] || [];
        total += tasks.length;
        done  += tasks.filter(t => t.done).length;
    }
    const percent = total === 0 ? 0 : Math.round((done / total) * 100);
    const fill = document.getElementById('progressFill');
    fill.style.width = `${percent}%`;
    fill.textContent = `${percent}%`;
    // Atualiza aria
    fill.closest('[role="progressbar"]').setAttribute('aria-valuenow', percent);
}

    '#ec4899','#8b5cf6','#06b6d4','#84cc16','#94a3b8'

// ── Render da página completa da Biblioteca ──

    const content = document.getElementById('bibContent');
    if (!content) return;

    content.innerHTML = '';

    // Filtra itens pelo dia selecionado
    const itensVisiveis = bibActiveFilter === 'all'
        ? bibliotecaData.itens
        : bibliotecaData.itens.filter(i => i.day === bibActiveFilter);

    // ── Se não há pastas, mostra estado vazio com CTA
    if (bibliotecaData.pastas.length === 0) {
        content.innerHTML = `
            <div class="bib-empty-cat" style="max-width:480px;margin:0 auto">

// ======================== PERSISTÊNCIA ========================
function saveAll() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasksData, notes, resourcesData, bibliotecaData }));
}

function loadFromLocal() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        try {
            const data = JSON.parse(saved);
            // Merge cuidadoso para não quebrar estrutura
            if (data.tasksData)      tasksData      = data.tasksData;
            if (data.notes)          notes          = data.notes;
            if (data.resourcesData)  resourcesData  = data.resourcesData;
            if (data.bibliotecaData) {
                bibliotecaData = data.bibliotecaData;
                // Migra formato antigo (categorias→pastas)
                if (!Array.isArray(bibliotecaData.pastas)) {
                    bibliotecaData.pastas = Array.isArray(bibliotecaData.categorias)
                        ? bibliotecaData.categorias.map(c => ({ id: c.id, nome: c.nome, cor: c.cor || '#e10600' }))
                        : [];
                }
                if (!Array.isArray(bibliotecaData.itens)) bibliotecaData.itens = [];
                // Migra categoriaId → pastaId em itens antigos
                bibliotecaData.itens.forEach(i => {
                    if (!i.pastaId && i.categoriaId) i.pastaId = i.categoriaId;
                });
                delete bibliotecaData.categorias;
            }
            // Garante que todos os dias existam
            for (const day of daysOrder) {
                if (!Array.isArray(tasksData[day])) tasksData[day] = [];
                // Migra formato antigo (string) para array
                if (typeof notes[day] === 'string') {
                    notes[day] = notes[day].trim()
                        ? [{ text: notes[day].trim(), time: 'Importado' }]
                        : [];
                } else if (!Array.isArray(notes[day])) {
                    notes[day] = [];
                }
            }
        } catch (e) {
            console.warn('Erro ao carregar dados salvos, usando padrão.', e);
        }
    }
    renderWeek();
    renderResources();
}

function exportData() {
    const customTitle = document.getElementById('editableTitle').value;
    const payload = JSON.stringify({ tasksData, notes, resourcesData, customTitle }, null, 2);
    const blob = new Blob([payload], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `estudos_${customTitle.replace(/[^a-z0-9]/gi, '_')}_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.json`;
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 10000); // revoga após uso
}

function importData(file) {
    const reader = new FileReader();
    reader.onload = ev => {
        try {
            const imported = JSON.parse(ev.target.result);
            if (!imported.tasksData || !imported.notes) {
                _modal.confirm_dialog({ title: 'Arquivo inválido', body: 'A estrutura do arquivo não foi reconhecida.', icon: 'fas fa-triangle-exclamation', confirmLabel: 'Fechar', danger: true, iconVariant: 'warning' }); return;
            }
            tasksData = imported.tasksData;
            notes     = imported.notes;
            if (imported.resourcesData)  resourcesData  = imported.resourcesData;
            if (imported.bibliotecaData) {
                bibliotecaData = imported.bibliotecaData;
                if (!Array.isArray(bibliotecaData.pastas)) {
                    bibliotecaData.pastas = Array.isArray(bibliotecaData.categorias)
                        ? bibliotecaData.categorias.map(c => ({ id: c.id, nome: c.nome, cor: c.cor || '#e10600' }))
                        : [];
                }
                if (!Array.isArray(bibliotecaData.itens)) bibliotecaData.itens = [];
                bibliotecaData.itens.forEach(i => { if (!i.pastaId && i.categoriaId) i.pastaId = i.categoriaId; });
                delete bibliotecaData.categorias;
            }
            if (imported.customTitle) {
                document.getElementById('editableTitle').value = imported.customTitle;
                updatePageTitle(imported.customTitle);
            }
            // Garante dias completos + migração de formato antigo
            for (const day of daysOrder) {
                if (!Array.isArray(tasksData[day])) tasksData[day] = [];
                if (typeof notes[day] === 'string') {
                    notes[day] = notes[day].trim()
                        ? [{ text: notes[day].trim(), time: 'Importado' }]
                        : [];
                } else if (!Array.isArray(notes[day])) {
                    notes[day] = [];
                }
            }
            saveAll();
            renderWeek();
            renderResources();
            _modal.confirm_dialog({ title: 'Backup restaurado!', body: 'Seus dados foram importados com sucesso.', icon: 'fas fa-circle-check', confirmLabel: 'Fechar', iconVariant: 'success' });
        } catch (e) {
            _modal.confirm_dialog({ title: 'Erro ao importar', body: 'O arquivo está corrompido ou em formato inválido.', icon: 'fas fa-triangle-exclamation', confirmLabel: 'Fechar', danger: true, iconVariant: 'warning' });
            console.error(e);
        }
    };
    reader.onerror = () => _modal.confirm_dialog({ title: 'Erro de leitura', body: 'Não foi possível ler o arquivo selecionado.', icon: 'fas fa-triangle-exclamation', confirmLabel: 'Fechar', danger: true, iconVariant: 'warning' });
    reader.readAsText(file);
}

/*
  frequenciaData = {
    registros: [ 'YYYY-MM-DD', ... ]   // array de datas com presença registrada
  }
*/
let frequenciaData = { registros: [] };

const FREQ_KEY = 'pomodash_frequencia';

function todayStr() {
    return new Date().toISOString().slice(0, 10); // 'YYYY-MM-DD'
}

function saveFrequencia() {
    localStorage.setItem(FREQ_KEY, JSON.stringify(frequenciaData));
}

function loadFrequencia() {
    try {
        const s = localStorage.getItem(FREQ_KEY);
        if (s) {
            const d = JSON.parse(s);
            if (Array.isArray(d.registros)) frequenciaData = d;
        }
    } catch(e) {}
}

function hasCheckinToday() {
    return frequenciaData.registros.includes(todayStr());
}

// Constrói o heatmap de 52 semanas (GitHub-style)
function buildHeatmap() {
    const grid  = document.getElementById('heatmapGrid');
    const yearEl = document.getElementById('heatmapYear');
    if (!grid) return;

    const today  = new Date();
    const year   = today.getFullYear();
    if (yearEl) yearEl.textContent = year;

    // Começa no domingo da semana que contém 1 jan do ano atual
    const jan1   = new Date(year, 0, 1);
    const start  = new Date(jan1);
    start.setDate(jan1.getDate() - jan1.getDay()); // recua para domingo

    const set = new Set(frequenciaData.registros);
    grid.innerHTML = '';

    let cur = new Date(start);
    const end = new Date(today);
    end.setDate(end.getDate() + (6 - end.getDay())); // avança para sábado da semana atual

    while (cur <= end) {
        const col = document.createElement('div');
        col.className = 'heatmap-week-col';
        for (let d = 0; d < 7; d++) {
            const cell = document.createElement('div');
            cell.className = 'heatmap-cell';
            const ds = cur.toISOString().slice(0, 10);
            const isFuture = cur > today;
            const isToday  = ds === todayStr();
            const hit      = set.has(ds);
            cell.setAttribute('data-level', isFuture ? '0' : hit ? '4' : '0');
            if (isToday) cell.style.outline = '2px solid #e10600';
            cell.title = `${cur.toLocaleDateString('pt-BR')}${hit ? ' ✓' : ''}`;
            col.appendChild(cell);
            cur.setDate(cur.getDate() + 1);
        }
        grid.appendChild(col);
    }
}

// Barras mensais
function buildMonthBars() {
    const wrap = document.getElementById('monthBars');
    const yearEl = document.getElementById('monthBarsYear');
    if (!wrap) return;

    const year = new Date().getFullYear();
    if (yearEl) yearEl.textContent = year;

    const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const counts = Array(12).fill(0);
    frequenciaData.registros.forEach(r => {
        if (r.startsWith(String(year))) {
            const m = parseInt(r.slice(5, 7), 10) - 1;
            if (m >= 0 && m < 12) counts[m]++;
        }
    });

    const max = Math.max(...counts, 1);
    wrap.innerHTML = '';
    const curMonth = new Date().getMonth();

    counts.forEach((v, i) => {
        const col = document.createElement('div');
        col.className = 'month-bar-col';
        const pct = Math.round((v / max) * 100);
        col.innerHTML = `
            <div class="month-bar-val">${v > 0 ? v : ''}</div>
            <div class="month-bar" style="height:${Math.max(pct, v > 0 ? 8 : 3)}%;opacity:${i === curMonth ? '1' : '0.55'}"></div>
            <div class="month-bar-label" style="${i === curMonth ? 'color:#e10600;opacity:1' : ''}">${months[i]}</div>
        `;
        wrap.appendChild(col);
    });
}

// Últimos 14 dias
function buildStreakDays() {
    const wrap = document.getElementById('streakDays');
    if (!wrap) return;

    const set   = new Set(frequenciaData.registros);
    const today = new Date();
    wrap.innerHTML = '';

    for (let i = 13; i >= 0; i--) {
        const d   = new Date(today);
        d.setDate(today.getDate() - i);
        const ds  = d.toISOString().slice(0, 10);
        const hit = set.has(ds);
        const isToday = i === 0;

        const col = document.createElement('div');
        col.className = 'streak-day';
        col.innerHTML = `
            <div class="streak-day-dot ${hit ? 'hit' : 'miss'}${isToday ? ' today' : ''}">
                ${hit ? '<i class="fas fa-check" style="font-size:0.6rem"></i>' : d.getDate()}
            </div>
            <div class="streak-day-label">${d.toLocaleDateString('pt-BR',{weekday:'short'}).slice(0,3)}</div>
        `;
        wrap.appendChild(col);
    }
}

// Stats cards
function buildDashStats() {
    const wrap = document.getElementById('dashStats');
    if (!wrap) return;

    const set   = new Set(frequenciaData.registros);
    const total = set.size;
    const year  = new Date().getFullYear();
    const thisYear = frequenciaData.registros.filter(r => r.startsWith(String(year))).length;

    // Streak atual (dias consecutivos até hoje)
    let streak = 0;
    const d = new Date();
    while (true) {
        const ds = d.toISOString().slice(0, 10);
        if (set.has(ds)) { streak++; d.setDate(d.getDate() - 1); }
        else break;
    }

    // Média semanal (últimas 4 semanas)
    let weekSum = 0;
    const now = new Date();
    for (let w = 0; w < 4; w++) {
        for (let day = 0; day < 7; day++) {
            const dd = new Date(now);
            dd.setDate(now.getDate() - w * 7 - day);
            if (set.has(dd.toISOString().slice(0, 10))) weekSum++;
        }
    }
    const weekAvg = (weekSum / 4).toFixed(1);

    wrap.innerHTML = `
        <div class="dash-stat">
            <div class="dash-stat-label">🔥 Sequência atual</div>
            <div class="dash-stat-value dash-stat-accent">${streak}</div>
            <div class="dash-stat-sub">dia${streak !== 1 ? 's' : ''} consecutivo${streak !== 1 ? 's' : ''}</div>
        </div>
        <div class="dash-stat">
            <div class="dash-stat-label">📅 Este ano</div>
            <div class="dash-stat-value">${thisYear}</div>
            <div class="dash-stat-sub">presença${thisYear !== 1 ? 's' : ''} registrada${thisYear !== 1 ? 's' : ''}</div>
        </div>
        <div class="dash-stat">
            <div class="dash-stat-label">📈 Média semanal</div>
            <div class="dash-stat-value">${weekAvg}</div>
            <div class="dash-stat-sub">dias/semana (últimas 4)</div>
        </div>
        <div class="dash-stat">
            <div class="dash-stat-label">🏆 Total geral</div>
            <div class="dash-stat-value">${total}</div>
            <div class="dash-stat-sub">dia${total !== 1 ? 's' : ''} de estudo no total</div>
        </div>
    `;
}

const PAGE_KEY = 'estudosF1_activePage';

function navigateTo(pageId) {
    // Hide all pages
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    // Deactivate all nav items
    document.querySelectorAll('.nav-item[data-page]').forEach(n => n.classList.remove('active'));

    // Show target page
    const page = document.getElementById(`page-${pageId}`);
    if (page) page.classList.add('active');

    // Activate nav item
    const navItem = document.querySelector(`.nav-item[data-page="${pageId}"]`);
    if (navItem) navItem.classList.add('active');

    // Re-render on page switch
    if (pageId === 'biblioteca') renderBiblioteca();
    if (pageId === 'menu') renderDashboard();

    localStorage.setItem(PAGE_KEY, pageId);
}

function initNavigation() {
    // Nav items
    document.querySelectorAll('.nav-item[data-page]').forEach(btn => {
        btn.addEventListener('click', () => navigateTo(btn.dataset.page));
    });

    // Menu cards (shortcuts on the home page)
    document.querySelectorAll('.menu-card[data-goto]').forEach(card => {
        card.addEventListener('click', () => navigateTo(card.dataset.goto));
    });

    // Restore last active page
    const saved = localStorage.getItem(PAGE_KEY) || 'menu';
    navigateTo(saved);
}

});

initTheme();
initNavigation();
loadSavedTitle();
setupEditableTitle();
_modal.init();
loadFromLocal();
initBiblioteca();
initDashboard();
</script>
